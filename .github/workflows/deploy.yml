name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build:
    name: Build check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/www/wwwroot/chenyc' }}
      DEPLOY_BRANCH: main
      PM2_APP_NAME: ${{ secrets.PM2_APP_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH
        run: |
          set -euo pipefail
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "${{ secrets.DEPLOY_SSH_KEY }}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Pack source
        run: |
          set -euo pipefail
          tar \
            --exclude='./.git' \
            --exclude='./.next' \
            --exclude='./node_modules' \
            --exclude='./artifacts' \
            -czf /tmp/chenyc-release.tar.gz .

      - name: Upload and deploy
        run: |
          set -euo pipefail
          scp -i ~/.ssh/deploy_key -P "$DEPLOY_PORT" /tmp/chenyc-release.tar.gz "$DEPLOY_USER@$DEPLOY_HOST:/tmp/chenyc-release.tar.gz"
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' PM2_APP_NAME='$PM2_APP_NAME' bash -s" <<'REMOTE'
          set -euo pipefail

          mkdir -p "$DEPLOY_PATH"
          cd "$DEPLOY_PATH"

          echo "Cleaning old source files..."
          rm -rf src public content docs .github
          rm -f AGENTS.md CLAUDE.md README.md eslint.config.mjs next-env.d.ts next.config.ts package.json package-lock.json postcss.config.mjs tsconfig.json

          echo "Installing dependencies..."
          tar -xzf /tmp/chenyc-release.tar.gz -C "$DEPLOY_PATH"
          npm ci --no-audit --no-fund

          echo "Building production bundle..."
          rm -rf .next
          npm run build

          echo "Restarting app..."
          if command -v pm2 >/dev/null 2>&1; then
            if [ -n "${PM2_APP_NAME:-}" ]; then
              pm2 restart "$PM2_APP_NAME"
            else
              pm2 restart all
            fi
            pm2 save
          else
            echo "pm2 not found, build finished without process restart."
          fi
          REMOTE
